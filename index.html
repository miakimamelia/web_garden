<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amelia's Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="title-bar top-bar" aria-label="window title bar">

      <div class="title-bar-text">Soft Mac Desktop</div>
      <div class="title-bar-controls">
      <span class="menu-time" data-menu-time style="color: #fff;"></span>
   
    </header>

    <main class="desktop-canvas">
      <article class="card window main-window deer" data-main-window>
        <div class="title-bar window-head" data-drag-handle>
          <div class="title-bar-text" data-url>bear://forest-home</div>
          <div class="title-bar-controls">
            <button aria-label="Minimize" data-collapse></button>
            <button aria-label="Maximize" data-reset></button>
            <button aria-label="Close" data-close></button>
          </div>
        </div>


        <div class="tab-bar" data-tab-bar></div>

        <div class="window-body">
          <div class="content-header">
            <p class="eyebrow" data-eyebrow></p>
            <h1 data-title></h1>
            <p class="lede" data-text></p>
          </div>
        </div>
      </article>
    </main>
  </div>

  <footer class="dock toolbar" aria-label="Dock">
    <button class="dock-icon button active" data-view="bear" aria-label="Forest view" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/home.PNG" alt="Home" style="width:100%;height:100%; object-fit:contain;display:block;"></button>
    <button class="dock-icon button" data-view="music" aria-label="Music" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/music.PNG" alt="Music" style="width:130%;height:130%;object-fit:contain;display:block;transform:translateY(-8px);"></button>
    <button class="dock-icon button" data-view="folder" aria-label="Folder" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/flower.png" alt="Folder" style="width:100%;height:100%;object-fit:contain;display:block;"></button>
    <button class="dock-icon button" data-view="pen" aria-label="Sketch" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/guestbook.png" alt="Sketch" style="width:130%;height:130%;object-fit:contain;display:block;transform:translateY(-6px) rotate(20deg);"></button>
    <button class="dock-icon button" data-view="desktop" aria-label="Desk tools" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/wings.png" alt="Desk tools" style="width:160%;height:160%;object-fit:contain;display:block;transform:translateY(-14px);"></button>
    <button class="dock-icon button" data-view="mail" aria-label="Letters" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/clover.png" alt="Letters" style="width:130%;height:130%;object-fit:contain;display:block;transform:translateY(-4px);"></button>
    <button class="dock-icon button" data-view="game" aria-label="Games" style="background:none;border:none;box-shadow:none;padding:0;"><img src="applications/camera.png" alt="Games" style="width:180%;height:180%;object-fit:contain;display:block;transform:translateY(-16px);"></button>
  </footer>

  <script>
    const menuTimeEl = document.querySelector('[data-menu-time]');
    const body = document.body;
    const timeFormat = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit' });

    function applyThemeByTime(now = new Date()) {
      const hour = now.getHours();
      const isDay = hour >= 7 && hour < 19;
      body.classList.toggle('theme-day', isDay);
      body.classList.toggle('theme-night', !isDay);
    }

    function renderClock() {
      const now = new Date();
      if (menuTimeEl) menuTimeEl.textContent = timeFormat.format(now);
      applyThemeByTime(now);
    }

    const views = {
      bear:     { label: 'Forest Home',  eyebrow: 'Soft desktop', title: 'Welcome',                    text: 'This is your base scene inspired by the deer from the wallpaper. Gentle knit texture and warm blush keep it calm.',                    url: 'www.amelias-web-garden.com/welcome', bg: 'deer'      },
      desktop:  { label: 'Desk Tools',   eyebrow: 'Workspace',     title: 'Pastel workstation ready.',  text: 'Quick notes, open tabs, and a tidy dock sit in one frame. Imagine a clean desk with soft light.',                                     url: 'desk://workspace',                  bg: 'marshmallows' },
      folder:   { label: 'Folders',      eyebrow: 'Storage',       title: 'Organize the keepsakes.',    text: 'Bundle sketches, screenshots, and cozy references into one pastel folder stack.',                                                     url: 'finder://folders',                  bg: 'silhouette'   },
      pen:      { label: 'Sketchpad',    eyebrow: 'Doodles',       title: 'Light pencil strokes.',      text: 'A soft knit backdrop for loose drawings and annotations—nothing harsh, just gentle lines.',                                           url: 'sketch://pad',                      bg: 'knit'         },
      music:    { label: 'Playlist',     eyebrow: 'Listening',     title: 'Featherlight soundtrack.',   text: 'Play whispery piano and lo-fi strings while you work. Volume stays polite.',                                                          url: 'listen://lofi',                     bg: 'heart'        },
      mail:     { label: 'Letters',      eyebrow: 'Messages',      title: 'Kind notes delivered.',      text: 'Send and collect small letters, stickers, and pastel stamps in one gentle inbox.',                                                    url: 'mail://letters',                    bg: 'bunny-card'   },
      game:     { label: 'Playtime',     eyebrow: 'Break',         title: 'Tiny games, soft glow.',     text: 'Take a pause with low-stakes play; everything stays dreamy and slow.',                                                               url: 'play://soft-games',                 bg: 'silhouette'   },
      art:      { label: 'Gallery',      eyebrow: 'Curate',        title: 'Display the plush unicorn.', text: 'Show your favorite illustrations and plush friends on a bright, airy wall.',                                                         url: 'gallery://unicorn',                 bg: 'unicorn'      },
      settings: { label: 'Settings',     eyebrow: 'Tweak',         title: 'Adjust the glow.',           text: 'Tone down brightness, shift blush, or swap wallpaper while the window stays in place.',                                              url: 'prefs://glow',                      bg: 'florals'      }
    };

    const mainWindow = document.querySelector('[data-main-window]');
    const tabBarEl   = document.querySelector('[data-tab-bar]');
    const closeBtn   = document.querySelector('[data-close]');
    const collapseBtn = document.querySelector('[data-collapse]');
    const resetBtn   = document.querySelector('[data-reset]');
    const urlEl      = document.querySelector('[data-url]');
    const eyebrowEl  = document.querySelector('[data-eyebrow]');
    const titleEl    = document.querySelector('[data-title]');
    const textEl     = document.querySelector('[data-text]');
    const dockButtons = Array.from(document.querySelectorAll('[data-view]'));

    const backgrounds = ['deer','marshmallows','silhouette','bunny-card','knit','heart','florals','unicorn'];
    let openTabs = [];
    let activeTab = null;

    function renderTabs() {
      if (!tabBarEl) return;
      tabBarEl.innerHTML = '';
      openTabs.forEach(name => {
        const view = views[name];
        const tab = document.createElement('div');
        tab.className = 'tab-item' + (name === activeTab ? ' active' : '');

        const label = document.createElement('span');
        label.className = 'tab-label';
        label.textContent = view.label;

        const x = document.createElement('button');
        x.className = 'tab-close';
        x.textContent = '×';
        x.setAttribute('aria-label', 'Close ' + view.label);
        x.addEventListener('click', e => { e.stopPropagation(); closeTab(name); });

        tab.appendChild(label);
        tab.appendChild(x);
        tab.addEventListener('click', () => activateTab(name));
        tabBarEl.appendChild(tab);
      });
    }

    function activateTab(name) {
      if (!views[name] || !mainWindow) return;
      activeTab = name;
      const view = views[name];
      backgrounds.forEach(bg => mainWindow.classList.remove(bg));
      mainWindow.classList.add(view.bg);
      mainWindow.classList.remove('closed');
      mainWindow.removeAttribute('aria-hidden');
      if (urlEl)     urlEl.textContent     = view.url;
      if (eyebrowEl) eyebrowEl.textContent = view.eyebrow;
      if (titleEl)   titleEl.textContent   = view.title;
      if (textEl)    textEl.textContent    = view.text;
      dockButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.view === name));
      renderTabs();
    }

    function openTab(name) {
      if (!views[name]) return;
      if (!openTabs.includes(name)) openTabs.push(name);
      activateTab(name);
    }

    function closeTab(name) {
      const idx = openTabs.indexOf(name);
      if (idx === -1) return;
      openTabs.splice(idx, 1);
      if (openTabs.length === 0) {
        activeTab = null;
        if (mainWindow) { mainWindow.classList.add('closed'); mainWindow.setAttribute('aria-hidden', 'true'); }
        dockButtons.forEach(btn => btn.classList.remove('active'));
        renderTabs();
        return;
      }
      if (activeTab === name) activateTab(openTabs[Math.min(idx, openTabs.length - 1)]);
      else renderTabs();
    }

    function closeWindow() {
      openTabs = []; activeTab = null;
      if (mainWindow) { mainWindow.classList.add('closed'); mainWindow.setAttribute('aria-hidden', 'true'); }
      dockButtons.forEach(btn => btn.classList.remove('active'));
      renderTabs();
    }

    function toggleCollapse() { if (mainWindow) mainWindow.classList.toggle('collapsed'); }

    function resetWindow() {
      if (!mainWindow) return;
      mainWindow.classList.remove('collapsed', 'closed');
      if (activeTab) activateTab(activeTab);
    }

    dockButtons.forEach(btn => {
      btn.addEventListener('click', () => openTab(btn.dataset.view));
      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTab(btn.dataset.view); }
      });
    });

    if (closeBtn)   closeBtn.addEventListener('click', closeWindow);
    if (collapseBtn) collapseBtn.addEventListener('click', toggleCollapse);
    if (resetBtn)   resetBtn.addEventListener('click', resetWindow);

    openTab('bear');
    renderClock();
    setInterval(renderClock, 30000);
  </script>
</body>
</html>
